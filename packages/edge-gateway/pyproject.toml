[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "edge-gateway"
version = "0.1.0"
description = "SAX XrfOnStream Edge Gateway - bridges local equipment to cloud via MQTT"
requires-python = ">=3.11"
dependencies = [
    "paho-mqtt>=2.0",
    "psycopg[binary]>=3.1",
    "pydantic>=2.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0",
    "pytest-mock>=3.0",
]

[tool.setuptools.packages.find]
where = ["."]
include = ["src*"]

[tool.pytest.ini_options]
testpaths = ["tests"]
